<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>R•X CORE SYSTEM</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* Слой 0: Текстура ртути */
        .layer-bg { position: absolute; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        
        /* Слой 1: Рей (с мягкой тенью, чтобы скрыть огрехи вырезания) */
        .layer-rey { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; 
                     height: 95vh; filter: drop-shadow(0 0 15px rgba(0,0,0,0.7)); }
        
        /* Слой 2: Твои интерфейсные панели (с эффектом стекла) */
        .layer-ui { position: absolute; width: 100%; height: 100%; z-index: 3; 
                    backdrop-filter: blur(3px); pointer-events: none; }
        
        /* Текст Рея */
        .greeting { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
                    z-index: 4; color: white; font-family: 'Phenomena', sans-serif; 
                    font-size: 45px; text-align: center; text-shadow: 2px 2px 10px rgba(0,0,0,1); }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='Слайд3.PNG') }}" class="layer-bg">
    <img src="{{ url_for('static', filename='rey_character.png') }}" class="layer-rey">
    <img src="{{ url_for('static', filename='ui_panels.png') }}" class="layer-ui">
    
    <div class="greeting">
        <span id="typewriter">{{ greeting }}</span>
    </div>
</body>
</html>
