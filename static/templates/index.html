<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>R•X CORE SYSTEM</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* Слой 1: Ртуть (Фон) */
        .layer-bg { position: absolute; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        
        /* Слой 2: Рей (с тенью) */
        .layer-rey { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; 
                     height: 90vh; filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
        
        /* Слой 3: Интерфейс (с эффектом стекла) */
        .layer-ui { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 3; 
                    pointer-events: none; }
        
        /* Блок приветствия */
        #greeting { position: absolute; z-index: 4; bottom: 15%; left: 10%; color: #fff; 
                    font-family: sans-serif; font-size: 22px; text-shadow: 2px 2px 5px #000; 
                    max-width: 400px; }
    </style>
</head>
<body>
    <img src="static/Слайд3.PNG" class="layer-bg">
    <img src="static/rey_character.png" class="layer-rey">
    <img src="static/ui_panels.png" class="layer-ui">
    
    <div id="greeting">Инициализация системы...</div>

    <script>
        const greetingEl = document.getElementById('greeting');
        const hour = new Date().getHours();
        
        // Логика иронии
        let message = "";
        if (hour >= 0 && hour < 6) {
            message = "Вам не спится? Заходите, в это время суток ирония препарируется особенно остро.";
        } else if (hour >= 6 && hour < 12) {
            message = "Доброе утро. Надеюсь, ваш кофе крепче моих структур данных.";
        } else {
            message = "К вашим услугам. Но не ждите, что я буду улыбаться.";
        }
        
        greetingEl.innerText = message;

        // "Черная книга" — логирование захода в консоль (или можно отправить на Telegram)
        console.log(`Система R•X: Пользователь зафиксирован в ${new Date().toLocaleTimeString()}`);
    </script>
</body>
</html>
