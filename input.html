<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лицо</title>
</head>
<body>
<h1>Лицо</h1>
<input type="text" id="word" placeholder="Введите слово">
<button onclick="sendWord()">Отправить</button>

<script>
function sendWord() {
  const word = document.getElementById("word").value;
  const interpreterURL = "interpreter.html?input=" + encodeURIComponent(word);
  window.location.href = interpreterURL;
}
</script>
</body>
</html>
